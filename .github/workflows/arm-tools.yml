# Builds tool binaries WolfStack needs on arm64 that upstream ships for amd64
# ONLY, and publishes them to the rolling `arm-tools-v1` GitHub release.
# setup.sh downloads these on arm64 hosts (with a checksum + a runtime
# self-test, falling back to an on-device source build if the download is
# unavailable or won't run) so an arm64 install is a quick fetch instead of a
# 20-30 min on-device compile (NoroNetwork/Pi users, 2026-07-09).
#
# proxmox-backup-client: Proxmox publishes the client for amd64 only
#   (download.proxmox.com/debian/pbs-client has no binary-arm64), so we build
#   it from their OFFICIAL source (git.proxmox.com/proxmox-backup) on a native
#   aarch64 runner — the exact same crate + build the on-device fallback
#   compiles, just done once in CI. Dynamically linked; setup.sh installs the
#   runtime libs (openssl3/fuse3/acl/zstd) and self-tests before use.
name: arm-tools

on:
  workflow_dispatch: {}
  schedule:
    # Monthly refresh so upstream fixes reach arm64 installs (offset from the
    # unraid-tools cron so they don't contend for the same release API window).
    - cron: "31 4 3 * *"

permissions:
  contents: write

jobs:
  pbs-client-arm64:
    # GitHub-hosted native arm64 Linux runner — no cross-compile / QEMU needed.
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          # The proxmox-backup-client crate links libssl, libacl, libfuse3
          # (pxar fuse-mount) and libsystemd; clang is needed by some -sys crates.
          sudo apt-get install -y --no-install-recommends \
            git build-essential pkg-config clang \
            libssl-dev libacl1-dev libfuse3-dev libsystemd-dev uuid-dev

      - name: Ensure a Rust toolchain
        run: |
          set -euo pipefail
          if ! command -v cargo >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -fsSL https://sh.rustup.rs | sh -s -- -y --profile minimal
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi

      - name: Clone Proxmox sources (proxmox-backup + sibling crates)
        run: |
          set -euo pipefail
          # git.proxmox.com's smart-http throttles/resets big clones from CI
          # egress ("Recv failure: Connection reset by peer"). Large buffer +
          # low-speed timeout + retry with backoff — the reset is transient.
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 120
          clone() {
            local url="$1" dir="$2" n=0
            until git clone --depth 1 --single-branch "$url" "$dir"; do
              n=$((n + 1))
              if [ "$n" -ge 5 ]; then echo "clone $dir failed after $n attempts"; exit 1; fi
              echo "clone $dir attempt $n failed — retrying in $((n * 20))s"
              rm -rf "$dir"; sleep $((n * 20))
            done
          }
          # proxmox-backup's crates-io deps on Proxmox's OWN crates (pathpatterns,
          # pxar, proxmox-*) aren't published to crates.io — its packaging
          # resolves them from sibling checkouts via a [patch.crates-io] block.
          # Clone that same set of official git.proxmox.com repos as siblings so
          # the patch (uncommented in the build step) points at real paths.
          clone https://git.proxmox.com/git/proxmox-backup.git proxmox-backup
          clone https://git.proxmox.com/git/proxmox.git proxmox
          clone https://git.proxmox.com/git/pxar.git pxar
          clone https://git.proxmox.com/git/pathpatterns.git pathpatterns
          clone https://git.proxmox.com/git/proxmox-fuse.git proxmox-fuse

      - name: Build proxmox-backup-client (aarch64)
        run: |
          set -euo pipefail
          cd proxmox-backup
          echo "── [patch.crates-io] block BEFORE uncommenting ──"
          sed -n '/patch\.crates-io/,/^$/p' Cargo.toml || true
          # Uncomment the ENTRIES under [patch.crates-io] (the header line itself
          # is not commented — only the `#pbs-api-types = { path = ... }` etc.
          # lines are). This points Proxmox's own crates at the sibling
          # ../proxmox, ../pxar, ../pathpatterns, ../proxmox-fuse checkouts. Range
          # runs from the header to the next [section] (or EOF).
          sed -i '/^\[patch\.crates-io\]/,/^\[/ { /^#/ s/^#[[:space:]]*// }' Cargo.toml
          echo "── [patch.crates-io] block AFTER uncommenting ──"
          sed -n '/patch\.crates-io/,/^$/p' Cargo.toml || true
          # rust-toolchain.toml (if present) pins the compiler; rustup honours it.
          cargo build --release --bin proxmox-backup-client
          test -x target/release/proxmox-backup-client
          cp target/release/proxmox-backup-client "$GITHUB_WORKSPACE/proxmox-backup-client-aarch64"

      - name: Verify it runs + checksum
        run: |
          set -euo pipefail
          file proxmox-backup-client-aarch64
          ./proxmox-backup-client-aarch64 --version
          sha256sum proxmox-backup-client-aarch64 > pbs-client-arm64.sha256
          ./proxmox-backup-client-aarch64 --version 2>&1 | head -1 > pbs-client-arm64-version.txt

      - name: Publish to the rolling arm-tools release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create arm-tools-v1 \
            --repo "$GITHUB_REPOSITORY" \
            --title "WolfStack arm64 tools" \
            --notes "arm64 tool binaries WolfStack builds because upstream ships amd64 only. Downloaded automatically by setup.sh on arm64 hosts (checksum-verified + runtime self-tested, with an on-device source-build fallback). Rolling release, refreshed monthly." \
            2>/dev/null || true
          gh release upload arm-tools-v1 \
            --repo "$GITHUB_REPOSITORY" --clobber \
            proxmox-backup-client-aarch64 pbs-client-arm64.sha256 pbs-client-arm64-version.txt
