<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfStack Console</title>
    <link rel="stylesheet" href="/css/xterm.min.css" />
    <link rel="stylesheet" id="main-css" href="/css/style.css" />
    <script src="/js/vendor/xterm.min.js"></script>
    <script src="/js/vendor/xterm-addon-fit.min.js"></script>
    <script src="/js/terminal-console.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            background: var(--bg-primary, #0a0a0a);
            color: var(--text-primary, #f0f0f0);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* The WolfTermConsole host fills the whole window. */
        #console-root {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>

<body>
    <div id="console-root"></div>

    <script>
        // Honour the operator's saved theme (shared localStorage, same origin)
        // so the pop-out matches the main app's dark/light/accent choice.
        (function () {
            try {
                const t = localStorage.getItem('wolfstack-theme');
                if (t && t !== 'dark') document.documentElement.setAttribute('data-theme', t);
            } catch (_) {}
        })();
    </script>
    <script>
        (function () {
            // The mounted WolfTermConsole handle — set once mount() runs; used by
            // the postMessage listener below so the opener can add tabs.
            let handle = null;
            const params = new URLSearchParams(window.location.search);
            const type = params.get('type') || 'lxc';
            const name = params.get('name') || '';
            const nodeId = params.get('node_id') || '';
            const pveNodeId = params.get('pve_node_id') || '';
            const pveVmid = params.get('pve_vmid') || '';
            const isPve = (type === 'pve' && pveNodeId !== '' && pveVmid !== '');

            document.title = `Console — ${name || (isPve ? 'PVE' : type)}`;

            // Auto-run an approved AI-action / predictive-Inbox command on the
            // opening shell (tab 1). The command is fetched from the server by
            // id (auth-gated; not taken from the URL) — preserves the previous
            // console.html behaviour, now scoped to the initial pane.
            // The 3D/VR terminal mirror (app.js topology view) loads this
            // page in a hidden iframe and reads window._term (xterm buffer)
            // and window._ws (to inject virtual-keyboard keystrokes). The
            // engine reassigns pane.ws on every reconnect, so expose live
            // getters that always point at the current initial pane socket.
            let _initialPane = null;
            try {
                Object.defineProperty(window, '_term', { configurable: true, get: () => _initialPane && _initialPane.term });
                Object.defineProperty(window, '_ws', { configurable: true, get: () => _initialPane && _initialPane.ws });
            } catch (_) { /* non-fatal — VR mirror just won't attach */ }

            function autoRunOnInitial(pane) {
                _initialPane = pane;
                if (!pane || !pane.ws) return;
                const term = pane.term;
                // Send against the LIVE pane socket — the engine reassigns
                // pane.ws on reconnect, so capturing it here could target a
                // stale, closed socket by the time the 800ms timer fires.
                const send = (data) => { try { if (pane.ws) pane.ws.send(data); } catch (_) {} };

                const actionId = params.get('action_id');
                if (actionId && /^[a-zA-Z0-9\-]+$/.test(actionId)) {
                    fetch('/api/ai/action/command?id=' + encodeURIComponent(actionId))
                        .then(r => { if (!r.ok) throw new Error('Action not found or not approved'); return r.json(); })
                        .then(data => {
                            if (data.command) {
                                if (term) {
                                    term.writeln('\x1b[33m🐺 AI Action: ' + (data.title || '') + '\x1b[0m');
                                    term.writeln('\x1b[36m$ ' + data.command + '\x1b[0m\r\n');
                                }
                                setTimeout(() => send(data.command + '\n'), 800);
                            }
                        })
                        .catch(e => { if (term) term.writeln('\x1b[31m⚠ Failed to load AI action: ' + e.message + '\x1b[0m\r\n'); });
                }

                const proposalId = params.get('proposal_id');
                const cmdIdx = params.get('cmd_idx');
                if (proposalId && cmdIdx && /^[A-Za-z0-9\-]+$/.test(proposalId) && /^\d+$/.test(cmdIdx)) {
                    fetch('/api/proposals/' + encodeURIComponent(proposalId) + '/command/' + encodeURIComponent(cmdIdx))
                        .then(r => { if (!r.ok) throw new Error('Proposal command not found'); return r.json(); })
                        .then(data => {
                            if (data.command) {
                                if (term) {
                                    term.writeln('\x1b[35m🔮 Predictive Inbox: ' + (data.title || 'remediation') + '\x1b[0m');
                                    term.writeln('\x1b[36m$ ' + data.command + '\x1b[0m\r\n');
                                }
                                setTimeout(() => send(data.command + '\n'), 800);
                            }
                        })
                        .catch(e => { if (term) term.writeln('\x1b[31m⚠ Failed to load predictive command: ' + e.message + '\x1b[0m\r\n'); });
                }
            }

            // Fetch the cluster node list so the pop-out's New Tab picker can
            // open additional sessions on any node. Resolve the self node so
            // the engine builds /ws/console (local) vs /ws/remote-console.
            function loadNodesThenMount() {
                fetch('/api/nodes')
                    .then(r => r.ok ? r.json() : [])
                    .then(nodes => mountConsole(Array.isArray(nodes) ? nodes : []))
                    .catch(() => mountConsole([]));
            }

            // One-shot streaming sessions (installs / upgrades) close their
            // socket when the job ends — don't auto-reconnect those.
            const ONE_SHOT = ['install', 'upgrade', 'pkg-install', 'appstore-install'];
            const noReconnect = ONE_SHOT.indexOf(type) !== -1;

            function mountConsole(nodes) {
                const self = nodes.find(n => n.is_self) || null;

                // Build the tab-1 descriptor from the query params.
                let initial;
                if (isPve) {
                    // Proxmox shell — the pve-console proxy is keyed on the PVE
                    // node id + vmid, not the cluster node id. Anchor it to the
                    // self node so the engine's pve branch fires.
                    initial = {
                        nodeId: self ? self.id : (nodeId || null),
                        type: 'pve', name: name || 'PVE Shell', label: (name || 'PVE') + ' (pve)',
                        pveNodeId: pveNodeId, pveVmid: pveVmid,
                    };
                } else if (nodeId) {
                    // Remote session — the URL carried an explicit node_id.
                    initial = { nodeId: nodeId, type: type, name: name };
                    // If that node isn't in /api/nodes (older peer / minimal
                    // response), synthesise a stub so the engine can resolve it.
                    if (!nodes.some(n => n.id === nodeId)) {
                        nodes = nodes.concat([{ id: nodeId, hostname: name || nodeId, is_self: false }]);
                    }
                } else {
                    // Local session — anchor to the self node.
                    initial = { nodeId: self ? self.id : null, type: type, name: name };
                }
                initial.noReconnect = noReconnect;

                handle = WolfTermConsole.mount(document.getElementById('console-root'), {
                    initial: initial,
                    nodes: nodes,
                    selfNodeId: self ? self.id : null,
                    onAfterInitialConnect: autoRunOnInitial,
                });
            }

            // The opener (the main app) reuses this one window for every
            // interactive shell: it posts an "addTab" descriptor instead of
            // spawning another popup. Focus an existing tab for the same target,
            // else add a new one — so opening a different LXC just adds a tab.
            window.addEventListener('message', (e) => {
                if (e.origin !== window.location.origin) return;
                const d = e.data;
                if (!d || d.__wolfstackTerminal !== 'addTab' || !d.descriptor || !handle) return;
                if (!handle.focusTab(d.descriptor)) handle.addTab(d.descriptor);
                try { window.focus(); } catch (_) {}
            });

            if (typeof WolfTermConsole === 'undefined' || !WolfTermConsole.mount) {
                document.getElementById('console-root').innerHTML =
                    '<div style="padding:40px;text-align:center;color:#f0f0f0;">Terminal engine failed to load — refresh the page.</div>';
            } else {
                loadNodesThenMount();
            }
        })();
    </script>
</body>

</html>
